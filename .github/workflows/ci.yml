name: CI
on:
  push:
permissions:
  contents: read
jobs:
  lint-and-typecheck:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bilan-carbone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Copy .env
        run: cp .env.dist .env
        working-directory: apps/bilan-carbone
      - name: Copy .env to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env
        working-directory: ${{ github.workspace }}
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
        working-directory: .
      - name: Generate prisma files
        run: yarn workspace @abc-transitionbascarbone/db-common prisma generate
        working-directory: .
      - name: Linter
        run: yarn lint
      - name: Prebuild application
        run: yarn prebuild
      - name: TypeScript check
        run: npx tsc --noEmit

  check-circular-deps:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bilan-carbone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Check circular dependencies
        run: npx madge --circular --extensions ts,tsx --exclude "packages/db-common/src/generated" .

  unit-tests:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bilan-carbone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Copy .env
        run: cp .env.dist .env
        working-directory: apps/bilan-carbone
      - name: Copy .env to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env
        working-directory: ${{ github.workspace }}
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
        working-directory: .
      - name: Prebuild application
        run: yarn prebuild
      - name: Generate prisma files
        run: yarn workspace @abc-transitionbascarbone/db-common prisma generate
        working-directory: .
      - name: Launch unit tests
        run: yarn run test

  unit-tests-publicodes:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bilan-carbone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Copy .env
        run: cp .env.dist .env
        working-directory: apps/bilan-carbone
      - name: Copy .env to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env
        working-directory: ${{ github.workspace }}
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
        working-directory: .
      - name: Prebuild application
        run: yarn prebuild
      - name: Launch unit tests
        run: yarn run publicodes-count:test

  build-app:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    defaults:
      run:
        working-directory: apps/bilan-carbone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Copy .env
        run: cp .env.dist .env
      - name: Copy .env to db-common
        run: cp .env.dist ../../packages/db-common/.env
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
        working-directory: ${{ github.workspace }}
      - name: Prebuild application
        run: yarn prebuild
      - name: Generate prisma files
        run: yarn workspace @repo/db-common prisma generate
        working-directory: ${{ github.workspace }}
      - name: Build application
        run: yarn build
      - name: Archive build output
        run: tar -czf /tmp/bilan-carbone-next-build.tgz .next
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-next-build
          path: /tmp/bilan-carbone-next-build.tgz

  e2e-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, build-app]
    strategy:
      fail-fast: false
      matrix:
        group:
          - auth
          - organization
          - study
          - emission-factors
          - emission-sources
          - pages
          - real-use-case
    defaults:
      run:
        working-directory: apps/bilan-carbone
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: bilancarbone
          POSTGRES_PASSWORD: bilancarbone
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Run maildev
        run: docker run -d -p 1080:1080 -p 1025:1025 maildev/maildev
      - name: Copy .env
        run: cp .env.dist .env
      - name: Copy .env to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env
        working-directory: ${{ github.workspace }}
      - name: Copy .env.test
        run: cp .env.dist .env.test
      - name: Copy .env.test to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env
        working-directory: ${{ github.workspace }}
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
        working-directory: .
      - name: Prebuild application
        run: yarn prebuild
      - name: Generate prisma files
        run: yarn workspace @abc-transitionbascarbone/db-common prisma generate
        working-directory: .
      - name: Migrate DB
        run: yarn workspace @abc-transitionbascarbone/db-common prisma migrate deploy
        working-directory: .
      - name: Seed DB
        run: yarn workspace bilan-carbone prisma db seed
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-next-build
          path: /tmp/ci-build
      - name: Extract build artifact
        run: tar -xzf /tmp/ci-build/bilan-carbone-next-build.tgz -C .
      - name: Start server
        run: yarn start &
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000
      - name: Launch e2e tests
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: yarn cypress run --spec "src/tests/end-to-end/app/${{ matrix.group }}/**/*.cy.ts" --headless
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.group }}
          path: ${{ github.workspace }}/apps/bilan-carbone/cypress/screenshots

  lighthouse:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, build-app]
    defaults:
      run:
        working-directory: apps/bilan-carbone
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: bilancarbone
          POSTGRES_PASSWORD: bilancarbone
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Run maildev
        run: docker run -d -p 1080:1080 -p 1025:1025 maildev/maildev
      - name: Copy .env
        run: cp .env.dist .env
      - name: Copy .env to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env
        working-directory: ${{ github.workspace }}
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
        working-directory: .
      - name: Prebuild application
        run: yarn prebuild
      - name: Generate prisma files
        run: yarn workspace @abc-transitionbascarbone/db-common prisma generate
        working-directory: .
      - name: Migrate DB
        run: yarn workspace @abc-transitionbascarbone/db-common prisma migrate deploy
        working-directory: .
      - name: Seed DB
        run: yarn workspace bilan-carbone prisma db seed
        working-directory: .
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: app-next-build
          path: /tmp/ci-build
      - name: Extract build artifact
        run: tar -xzf /tmp/ci-build/bilan-carbone-next-build.tgz -C .
      - name: Start server
        run: yarn start &
      - run: mkdir -p ${{ github.workspace }}/tmp/artifacts
      - name: Lighthouse Check
        uses: foo-software/lighthouse-check-action@master
        id: lighthouseCheck
        with:
          device: all
          urls: 'http://localhost:3000'
          outputDirectory: ${{ github.workspace }}/tmp/artifacts
      - name: Verify Lighthouse Check results
        uses: foo-software/lighthouse-check-status-action@master
        with:
          lighthouseCheckResults: ${{ steps.lighthouseCheck.outputs.lighthouseCheckResults }}
          minAccessibilityScore: '100'
          # TODO : set back to 100 when all CSP error logs are fixed
          minBestPracticesScore: '90'
      - name: Upload Lighthouse artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Lighthouse reports
          path: ${{ github.workspace }}/tmp/artifacts
