name: CI
on:
  push:
jobs:
  lint-and-typecheck:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bilan-carbone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Copy .env
        run: cp .env.dist .env
        working-directory: apps/bilan-carbone
      - name: Copy .env to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env
        working-directory: ${{ github.workspace }}
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
        working-directory: .
      - name: Generate prisma files
        run: yarn workspace @repo/db-common prisma generate
        working-directory: .
      - name: Linter
        run: yarn lint
      - name: Prebuild application
        run: yarn prebuild
      - name: TypeScript check
        run: npx tsc --noEmit

  check-circular-deps:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bilan-carbone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Check circular dependencies
        run: npx madge --circular --extensions ts,tsx --exclude "packages/db-common/src/generated" .

  unit-tests:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bilan-carbone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Copy .env
        run: cp .env.dist .env
        working-directory: apps/bilan-carbone
      - name: Copy .env to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env
        working-directory: ${{ github.workspace }}
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
        working-directory: .
      - name: Prebuild application
        run: yarn prebuild
      - name: Generate prisma files
        run: yarn workspace @repo/db-common prisma generate
        working-directory: .
      - name: Launch unit tests
        run: yarn run test

  unit-tests-publicodes:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/bilan-carbone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Copy .env
        run: cp .env.dist .env
        working-directory: apps/bilan-carbone
      - name: Copy .env to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env
        working-directory: ${{ github.workspace }}
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
        working-directory: .
      - name: Prebuild application
        run: yarn prebuild
      - name: Launch unit tests
        run: yarn run publicodes-count:test

  e2e-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    defaults:
      run:
        working-directory: apps/bilan-carbone
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: bilancarbone
          POSTGRES_PASSWORD: bilancarbone
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Run maildev
        run: docker run -d -p 1080:1080 -p 1025:1025 maildev/maildev
      - name: Copy .env
        run: cp .env.dist .env
      - name: Copy .env to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env
        working-directory: ${{ github.workspace }}
      - name: Copy .env.test
        run: cp .env.dist .env.test
      - name: Copy .env.test to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env
        working-directory: ${{ github.workspace }}
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
        working-directory: .
      - name: Prebuild application
        run: yarn prebuild
      - name: Generate prisma files
        run: yarn workspace @repo/db-common prisma generate
        working-directory: .
      - name: Migrate DB
        run: yarn workspace @repo/db-common prisma migrate deploy
        working-directory: .
      - name: Seed DB
        run: yarn workspace bilan-carbone prisma db seed
      - name: Build application
        run: yarn build
      - name: Start server
        run: yarn start &
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 60000
      - name: Launch e2e tests
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          for spec in src/tests/end-to-end/app/*.cy.ts; do
            echo "Running test: $spec"
            yarn cypress run --spec "$spec" --headless || exit 1
          done
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: ${{ github.workspace }}/apps/bilan-carbone/cypress/screenshots

  playwright-e2e-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    defaults:
      run:
        working-directory: apps/bilan-carbone
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: bilancarbone
          POSTGRES_PASSWORD: bilancarbone
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Copy .env
        run: cp .env.dist .env
      - name: Copy .env to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env
        working-directory: ${{ github.workspace }}
      - name: Copy .env.test
        run: cp .env.dist .env.test
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
        working-directory: .
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Prebuild application
        run: yarn prebuild
      - name: Generate prisma files
        run: yarn workspace @repo/db-common prisma generate
        working-directory: .
      - name: Migrate DB
        run: yarn workspace @repo/db-common prisma migrate deploy
        working-directory: .
      - name: Build standalone application
        run: yarn build
      - name: Launch Playwright tests
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: yarn playwright:test playwright/create-emission-source.spec.ts
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            ${{ github.workspace }}/apps/bilan-carbone/playwright-report
            ${{ github.workspace }}/apps/bilan-carbone/test-results

  lighthouse:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    defaults:
      run:
        working-directory: apps/bilan-carbone
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: bilancarbone
          POSTGRES_PASSWORD: bilancarbone
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: 'yarn'
      - name: Run maildev
        run: docker run -d -p 1080:1080 -p 1025:1025 maildev/maildev
      - name: Copy .env
        run: cp .env.dist .env
      - name: Copy .env to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env
        working-directory: ${{ github.workspace }}
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache
        working-directory: .
      - name: Prebuild application
        run: yarn prebuild
      - name: Generate prisma files
        run: yarn workspace @repo/db-common prisma generate
        working-directory: .
      - name: Migrate DB
        run: yarn workspace @repo/db-common prisma migrate deploy
        working-directory: .
      - name: Seed DB
        run: yarn workspace bilan-carbone prisma db seed
        working-directory: .
      - name: Build application
        run: yarn build
      - name: Start server
        run: yarn start &
      - run: mkdir -p ${{ github.workspace }}/tmp/artifacts
      - name: Lighthouse Check
        uses: foo-software/lighthouse-check-action@master
        id: lighthouseCheck
        with:
          device: all
          urls: 'http://localhost:3000'
          outputDirectory: ${{ github.workspace }}/tmp/artifacts
      - name: Verify Lighthouse Check results
        uses: foo-software/lighthouse-check-status-action@master
        with:
          lighthouseCheckResults: ${{ steps.lighthouseCheck.outputs.lighthouseCheckResults }}
          minAccessibilityScore: '100'
          # TODO : set back to 100 when all CSP error logs are fixed
          minBestPracticesScore: '90'
      - name: Upload Lighthouse artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Lighthouse reports
          path: ${{ github.workspace }}/tmp/artifacts
