name: Copilot Coding Agent
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: write
  pull-requests: write
jobs:
  copilot-coding-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: github/copilot-coding-agent@latest
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
