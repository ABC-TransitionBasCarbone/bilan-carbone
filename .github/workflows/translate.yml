name: Translate missing i18n keys

on:
  # Automatic: triggers when FR translation files are updated on develop
  push:
    branches: [develop]
    paths:
      - 'packages/i18n/translations/fr/**'

  # Manual: allows choosing a specific locale and file
  workflow_dispatch:
    inputs:
      locale:
        description: 'Target locale (leave empty to translate all)'
        required: false
        default: ''
        type: choice
        options: ['', en, es, it, ro, hr, hu, el]
      file:
        description: 'File to translate (common | all)'
        required: false
        default: 'common'

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: yarn

      - name: Copy .env (needed for postinstall scripts)
        run: cp apps/bilan-carbone/.env.dist apps/bilan-carbone/.env

      - name: Copy .env to db-common
        run: cp apps/bilan-carbone/.env.dist packages/db-common/.env

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run translation script
        working-directory: packages/i18n
        run: |
          if [ "${{ github.event_name }}" = "push" ] || [ -z "${{ inputs.locale }}" ]; then
            yarn tsx scripts/translate-missing.ts --all-locales --file ${{ inputs.file || 'common' }}
          else
            yarn tsx scripts/translate-missing.ts --locale ${{ inputs.locale }} --file ${{ inputs.file || 'common' }}
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'i18n: auto-translate missing keys'
          title: '[i18n] Auto-translate missing keys'
          body: |
            Auto-generated by the `translate-missing` workflow.

            | | |
            |---|---|
            | Trigger | `${{ github.event_name }}` |
            | Locale | `${{ inputs.locale || 'all' }}` |
            | File | `${{ inputs.file || 'common' }}` |
            | Model | `claude-opus-4-8` |
            | Glossary | [methode-bilan-carbone/glossaire.csv](https://github.com/ABC-TransitionBasCarbone/methode-bilan-carbone/blob/main/glossaire.csv) |

            **Please review domain-specific terms before merging**, especially anything related to emission categories, boundaries, and Bilan Carbone® methodology.
          branch: i18n/auto-translate
          delete-branch: true
          labels: i18n, automated
