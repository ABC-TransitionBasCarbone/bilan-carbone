services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: bilancarbone
      POSTGRES_PASSWORD: bilancarbone
    ports:
      - '5432:5432'
  db_test:
    image: postgres:17
    environment:
      POSTGRES_USER: bilancarbone
      POSTGRES_PASSWORD: bilancarbone
      POSTGRES_DB: bilancarbone_test
    ports:
      - '5433:5432'
  maildev:
    image: maildev/maildev
    ports:
      - '1080:1080'
      - '1025:1025'
  waf:
    image: owasp/modsecurity-crs:nginx
    profiles:
      - waf
    environment:
      # owasp/modsecurity-crs:nginx reads ${BACKEND} in includes/proxy_backend.conf.template
      BACKEND: ${WAF_BACKEND:-http://host.docker.internal:3000}
      PORT: 8080
      SERVER_NAME: localhost
      MODSEC_RULE_ENGINE: 'On'
      NGINX_ALWAYS_TLS_REDIRECT: 'off'
    ports:
      - '8080:8080'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./waf/custom-rules.conf:/etc/modsecurity.d/custom_rules.d/custom-rules.conf:ro
      - ./waf/default.conf.template:/etc/nginx/templates/conf.d/default.conf.template:ro
