SecRuleEngine On
SecRequestBodyAccess On

SecRule REQUEST_URI "@rx (?i)(/\\.env|/\\.git|/wp-admin|/phpmyadmin|/boaform)" "id:10001,phase:1,deny,status:403,log,msg:'Blocked sensitive path scan'"
SecRule ARGS_NAMES|ARGS|REQUEST_URI "@rx (?i)(union\\s+select|select\\s+from|<script|\\.\\./)" "id:10002,phase:2,deny,status:403,log,msg:'Blocked injection pattern'"
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(sqlmap|nikto|nmap|acunetix|dirbuster|masscan|zgrab)" "id:10003,phase:1,deny,status:403,log,msg:'Blocked malicious scanner user-agent'"
