SecRuleEngine On
SecRequestBodyAccess On

SecRule REQUEST_URI "@rx (?i)(/\\.env|/\\.git|/\\.svn|/\\.hg|/\\.DS_Store|%2eenv|%2egit|%2eds_store|%2f%2e(env|git|svn|hg|ds_store)|%252e(env|git|svn|hg|ds_store)|%252f%252e(env|git|svn|hg|ds_store))" "id:10001,phase:1,deny,status:403,log,msg:'Blocked sensitive path scan'"
SecRule REQUEST_HEADERS:User-Agent "@rx (?i)(sqlmap|nikto|nmap|acunetix|dirbuster|masscan|zgrab)" "id:10002,phase:1,deny,status:403,log,msg:'Blocked malicious scanner user-agent'"
